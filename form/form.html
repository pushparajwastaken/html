<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <form action="" method="">
      <label for="username">Username</label>
      <input type="text" name="" id="username" placeholder="Lavanya" />
      <br />
      <label for="Password">Password</label>
      <input type="text" name="" id="Password" />
      <br />
      <label for="Email">Email</label>
      <input type="text" name="" id="Email" placeholder="lavanya@gmail.com" />
      <br />
      <label for="Phone">Phone</label>
      <input type="text" name="" id="Phone" />
      <br />
      <label for="Birthday">Birthday</label>
      <input type="date" name="" id="Birthday" />
      <br />
      <label for="Mr">Mr.</label>
      <input type="radio" name="title" id="Mr" />

      <label for="Mrs.">Mrs.</label>
      <input type="radio" name="title" id="Mrs." />

      <label for="Phd">Phd</label>
      <input type="radio" name="title" id="Phd" />
      <br />
      <label for="payment">Payment</label>
      <select name="" id="payment">
        <option value="">Cash</option>
        <option value="">Card</option>
        <option value="">UPI</option>
      </select>
      <br />
      <label for="carry-bag">Carry Bag</label>
      <input type="checkbox" name="" id="carry-bag" />
      <br />
      <label for="comment">Comment</label>
      <textarea name="" id="comment"></textarea>
      <br />
      <label for="file">File:</label>
      <input type="file" id="file" accept="image/png" />
      <br />
      <input type="reset" value="reset" />
      <input type="submit" value="submit" />
    </form>
  </body>
</html>
